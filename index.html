<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFEX OSINT ELITE | ULTIMATE EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #050505; --neon: #00ff41; }
        body { background: var(--dark); color: #eee; font-family: 'Courier New', monospace; overflow-x: hidden; }
        .gold-border { border: 1px solid var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.2); }
        .gold-text { color: var(--gold); text-shadow: 0 0 5px var(--gold); }
        .card { background: rgba(10,10,10,0.9); border-radius: 4px; border: 1px solid rgba(212,175,55,0.2); transition: 0.3s; }
        .card:hover { border-color: var(--gold); box-shadow: 0 0 20px rgba(212,175,55,0.1); }
        .btn-gold { background: var(--gold); color: black; font-weight: bold; transition: 0.3s; border: none; cursor: pointer; }
        .btn-gold:hover { filter: brightness(1.2); box-shadow: 0 0 15px var(--gold); transform: translateY(-2px); }
        input, select { background: #111 !important; border: 1px solid #333 !important; color: var(--gold) !important; outline: none; padding: 10px; }
        input:focus { border-color: var(--gold) !important; }
        .terminal { background: #000; border: 1px solid #222; height: 200px; overflow-y: auto; font-size: 11px; padding: 10px; color: var(--neon); }
        #drop-zone { border: 2px dashed #333; transition: 0.3s; }
        #drop-zone.active { border-color: var(--gold); background: rgba(212,175,55,0.05); }
        .node { stroke: var(--gold); stroke-width: 2; fill: #000; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
        .scanning { animation: pulse 1s infinite; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-8 p-6 gold-border rounded-lg relative overflow-hidden">
            <h1 class="text-5xl font-black gold-text tracking-tighter">INFEX OSINT v3.0</h1>
            <p class="text-gray-500 uppercase tracking-[8px] text-[10px] mt-2">Elite Intelligence & Data Extraction System</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="lg:col-span-2 card p-6">
                <label class="block text-[10px] text-gray-500 mb-2 uppercase">Main Target Input</label>
                <div class="flex gap-2">
                    <input type="text" id="target" class="w-full text-xl" placeholder="Nickname, Email, IP, Phone...">
                    <button onclick="runGlobalSearch()" class="btn-gold px-10 uppercase">Analyze</button>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mt-4">
                    <button onclick="quickDork('pass')" class="text-[9px] bg-red-900/20 border border-red-900 text-red-500 p-2 uppercase hover:bg-red-900/40">Passwords</button>
                    <button onclick="quickDork('docs')" class="text-[9px] bg-blue-900/20 border border-blue-900 text-blue-500 p-2 uppercase hover:bg-blue-900/40">Docs/PDF</button>
                    <button onclick="quickDork('env')" class="text-[9px] bg-green-900/20 border border-green-900 text-green-500 p-2 uppercase hover:bg-green-900/40">Config/Env</button>
                    <button onclick="quickDork('cam')" class="text-[9px] bg-yellow-900/20 border border-yellow-900 text-yellow-500 p-2 uppercase hover:bg-yellow-900/40">Live Cam</button>
                </div>
            </div>

            <div class="card p-6" id="drop-zone">
                <label class="block text-[10px] text-gray-500 mb-2 uppercase text-center">Metadata Extractor (Drag & Drop File)</label>
                <div class="text-center py-4">
                    <i class="fas fa-file-import text-3xl mb-2 text-gray-700"></i>
                    <p class="text-[10px] text-gray-500">Drop Image or Doc to parse EXIF/Meta</p>
                    <input type="file" id="file-input" class="hidden" onchange="handleFile(this.files[0])">
                    <button onclick="document.getElementById('file-input').click()" class="mt-2 text-[9px] underline text-gold">Browse File</button>
                </div>
                <div id="file-info" class="text-[9px] text-green-600 font-mono mt-2 h-10 overflow-hidden"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="card p-4">
                <h3 class="gold-text text-sm mb-4"><i class="fas fa-network-wired mr-2"></i> RELATIONS GRAPH</h3>
                <div id="graph-area" class="h-64 flex items-center justify-center border border-gray-900 relative">
                    <div id="graph-main" class="w-16 h-16 rounded-full border-2 border-gold flex items-center justify-center text-[10px] gold-text scanning">TARGET</div>
                    </div>
            </div>
            
            <div class="card p-4">
                <h3 class="gold-text text-sm mb-4"><i class="fas fa-search-location mr-2"></i> GLOBAL VECTORS</h3>
                <div id="vectorBox" class="space-y-2 text-[11px]">
                    <p class="text-gray-700 italic">No active scan...</p>
                </div>
            </div>

            <div class="card p-4">
                <h3 class="gold-text text-sm mb-4"><i class="fas fa-shield-virus mr-2"></i> LEAK ANALYZER</h3>
                <div id="leakBox" class="space-y-2 text-[11px]">
                    <p class="text-gray-700 italic">Ready for deep dive...</p>
                </div>
            </div>
        </div>

        <div class="terminal font-mono mb-4" id="console">
            <div>> [SYSTEM] INFEX OSINT BOOTED. STANDING BY FOR MASTER COMMAND...</div>
        </div>
        <div class="flex justify-between">
            <button onclick="clearAll()" class="text-[10px] text-gray-600 uppercase hover:text-white">[Clear System]</button>
            <button onclick="exportFullReport()" class="text-[10px] text-gold uppercase font-bold hover:underline">[Generate Master Report]</button>
        </div>
    </div>

    <script>
        const log = (msg, color = "#00ff41") => {
            const con = document.getElementById('console');
            con.innerHTML += `<div><span style="color: #444">[${new Date().toLocaleTimeString()}]</span> <span style="color: ${color}">> ${msg}</span></div>`;
            con.scrollTop = con.scrollHeight;
        };

        function createAction(parent, title, url) {
            const p = document.getElementById(parent);
            if(p.innerText.includes("No active")) p.innerHTML = "";
            const div = document.createElement('div');
            div.className = "flex justify-between items-center p-2 bg-white/5 hover:bg-gold/10 rounded cursor-pointer transition border border-transparent hover:border-gold/30";
            div.innerHTML = `<span>${title}</span> <i class="fas fa-external-link-alt text-[9px] text-gold/50"></i>`;
            div.onclick = () => window.open(url, '_blank');
            p.appendChild(div);
        }

        function quickDork(type) {
            const val = document.getElementById('target').value;
            if(!val) return alert("Введите цель!");
            let query = "";
            switch(type) {
                case 'pass': query = `site:pastebin.com OR site:ghostbin.com "${val}" password`; break;
                case 'docs': query = `site:*.* "${val}" filetype:pdf OR filetype:doc OR filetype:xlsx`; break;
                case 'env': query = `site:*.* "${val}" ext:env OR ext:log OR ext:ini OR ext:conf`; break;
                case 'cam': query = `inurl:"view.shtml" "Network Camera" "${val}"`; break;
            }
            window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
            log(`Dork executed: ${type} for ${val}`, "#d4af37");
        }

        function runGlobalSearch() {
            const val = document.getElementById('target').value.trim();
            if(!val) return;
            
            log(`Инициирован глобальный протокол: ${val}`, "#d4af37");
            document.getElementById('vectorBox').innerHTML = "";
            document.getElementById('leakBox').innerHTML = "";
            
            // Visual Graph Animation
            document.getElementById('graph-main').innerText = val.substring(0, 10);
            
            // Socials
            createAction('vectorBox', "WhatsMyName Enumerator", `https://whatsmyname.app/?q=${val}`);
            createAction('vectorBox', "Epieos (Email/Identity)", `https://epieos.com/?q=${val}`);
            createAction('vectorBox', "Social Search Engine", `https://www.social-searcher.com/search-users/?q=${val}`);
            
            // Infra
            createAction('vectorBox', "Shodan IoT Search", `https://www.shodan.io/search?query=${val}`);
            createAction('vectorBox', "Censys Network Hosts", `https://search.censys.io/search?resource=hosts&q=${val}`);
            
            // Leaks
            createAction('leakBox', "IntelX Intelligence", `https://intelx.io/?s=${val}`);
            createAction('leakBox', "LeakIX (Exploits/Leaks)", `https://leakix.net/search?q=${val}`);
            createAction('leakBox', "Wayback Machine Archive", `https://web.archive.org/web/*/${val}`);
            createAction('leakBox', "DeHashed Public Preview", `https://dehashed.com/search?query=${val}`);

            log("Протокол выполнен. Найдены активные векторы в 3 категориях.");
        }

        // Metadata Simulation (JS client-side parsing)
        function handleFile(file) {
            if(!file) return;
            log(`Анализ файла: ${file.name}...`, "#3b82f6");
            document.getElementById('file-info').innerText = "Reading headers...";
            
            setTimeout(() => {
                const info = `Name: ${file.name}\nSize: ${file.size} bytes\nType: ${file.type}\nLastMod: ${new Date(file.lastModified).toLocaleDateString()}`;
                document.getElementById('file-info').innerText = info;
                log("Метаданные извлечены локально.", "#3b82f6");
            }, 1000);
        }

        // Export Report
        function exportFullReport() {
            const val = document.getElementById('target').value || "UNKNOWN";
            const content = `INFEX OSINT REPORT\n====================\nTarget: ${val}\nGenerated: ${new Date().toLocaleString()}\n\nLogs:\n` + document.getElementById('console').innerText;
            const blob = new Blob([content], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `INFEX_REPORT_${val.toUpperCase()}.txt`;
            a.click();
            log("Полный отчет сформирован и скачан.", "#fff");
        }

        function clearAll() {
            location.reload();
        }

        // Drag and Drop Logic
        const dz = document.getElementById('drop-zone');
        dz.ondragover = (e) => { e.preventDefault(); dz.classList.add('active'); };
        dz.ondragleave = () => dz.classList.remove('active');
        dz.ondrop = (e) => {
            e.preventDefault();
            dz.classList.remove('active');
            handleFile(e.dataTransfer.files[0]);
        };
    </script>
</body>
</html>
