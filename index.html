<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFEX OSINT | GOLD ELITE EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --gold-primary: #d4af37; 
            --gold-light: #fcf6ba; 
            --gold-dark: #aa771c;
            --dark: #050505; 
            --panel: rgba(10, 10, 10, 0.9);
        }

        body { 
            background: var(--dark); 
            color: #eee; 
            font-family: 'Courier New', monospace; 
            overflow-x: hidden; 
            background-image: radial-gradient(circle at 50% -20%, #1a1508 0%, var(--dark) 80%);
        }

        /* 3D GOLD TEXT EFFECT */
        .gold-text { 
            background: linear-gradient(to bottom, #fcf6ba 0%, #d4af37 40%, #aa771c 50%, #d4af37 60%, #fcf6ba 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(212,175,55,0.4));
            font-weight: 900;
            position: relative;
            transform: translateZ(50px);
        }

        /* 3D CARD ENHANCEMENT */
        .card-3d { 
            background: var(--panel);
            border: 1px solid rgba(212,175,55,0.3); 
            border-radius: 12px; 
            box-shadow: 20px 20px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            transform-style: preserve-3d;
            transition: all 0.3s ease;
        }

        .gold-border-glow {
            box-shadow: 0 0 30px rgba(212,175,55,0.2), inset 0 0 20px rgba(212,175,55,0.05);
        }

        /* ELITE BUTTON 3D */
        .btn-execute { 
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fcf6ba, #bf953f);
            background-size: 400% 400%;
            color: #000; 
            font-weight: 900; 
            border: none; 
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: goldFlow 5s ease infinite;
            transform: translateZ(30px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        @keyframes goldFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* TERMINAL EFFECT */
        .terminal { 
            background: rgba(0,0,0,0.95); 
            border-left: 5px solid var(--gold-primary);
            box-shadow: 0 0 40px rgba(212,175,55,0.1);
        }

        input { 
            background: #000 !important; 
            border: 1px solid rgba(212,175,55,0.4) !important; 
            color: var(--gold-light) !important; 
            text-shadow: 0 0 10px rgba(212,175,55,0.5);
        }

        /* CUSTOM PARTICLES CANVAS */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }
    </style>
</head>
<body class="p-4 md:p-8">
    <canvas id="bg-canvas"></canvas>

    <div class="max-w-7xl mx-auto">
        <!-- HEADER WITH 3D TILT -->
        <header class="text-center mb-12 p-12 card-3d gold-border-glow relative overflow-hidden" data-tilt data-tilt-glare data-tilt-max-glare="0.3">
            <div class="absolute top-0 left-0 w-full h-full opacity-20 pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
            <h1 class="text-7xl font-black gold-text italic tracking-tighter mb-4">INFEX OSINT v7.0</h1>
            <p class="text-zinc-500 uppercase tracking-[25px] text-[10px] font-bold">Gold Elite Intelligence System</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8 mb-12">
            <div class="lg:col-span-3 card-3d p-10" data-tilt>
                <label class="text-[10px] text-zinc-500 uppercase mb-3 block tracking-widest font-bold">Target Identification / Анализ объекта</label>
                <input type="text" id="targetInput" class="w-full p-6 text-4xl font-black rounded-lg outline-none transition-all shadow-2xl" placeholder="ENTER UID OR IP">
                <div class="flex gap-6 mt-8">
                    <button onclick="quickDork('leak')" class="flex-grow text-[11px] border border-zinc-800 text-zinc-400 py-4 uppercase hover:border-gold-primary hover:text-gold-light transition-all font-black tracking-widest bg-black">Leak Search</button>
                    <button onclick="quickDork('social')" class="flex-grow text-[11px] border border-zinc-800 text-zinc-400 py-4 uppercase hover:border-gold-primary hover:text-gold-light transition-all font-black tracking-widest bg-black">Social Search</button>
                </div>
            </div>
            
            <button onclick="masterProtocol()" id="startBtn" class="btn-execute rounded-xl p-6 flex flex-col items-center justify-center group" data-tilt data-tilt-scale="1.05">
                <i class="fas fa-crown text-4xl mb-3 group-hover:rotate-12 transition-transform"></i>
                <span class="text-3xl font-black uppercase tracking-tighter">Execute</span>
                <span class="text-[10px] mt-2 opacity-80 font-bold">Gold Protocol</span>
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-12">
            <div class="lg:col-span-5 card-3d p-8 h-[500px] flex flex-col" data-tilt>
                <h3 class="gold-text text-sm mb-6 uppercase font-black italic flex items-center">
                    <span class="w-3 h-3 bg-gold-primary rounded-full mr-4 animate-ping"></span>
                    Neural Core Mapping
                </h3>
                <div id="graph-area" class="flex-grow border border-gold-primary/10 rounded-lg overflow-hidden bg-black/50 relative">
                    <div id="target-label" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-50 text-white font-black text-center text-[10px] uppercase tracking-widest bg-black/95 px-8 py-4 border border-gold-primary shadow-2xl">
                        System Ready
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7 card-3d p-8 flex flex-col" data-tilt>
                <h3 class="gold-text text-sm mb-6 uppercase font-black border-b border-gold-primary/20 pb-4 flex justify-between italic">
                    <span>Forensic GPRS & Metadata</span>
                    <span id="gps-status" class="hidden bg-red-600 px-3 py-1 rounded text-[10px] animate-pulse">LIVE TRACKING</span>
                </h3>
                <div id="drop-zone" class="p-12 rounded-xl text-center mb-8 border-2 border-dashed border-gold-primary/20 hover:border-gold-primary transition-all cursor-pointer bg-black/40 group" onclick="document.getElementById('fileInput').click()">
                    <i class="fas fa-fingerprint text-5xl mb-4 text-zinc-800 group-hover:text-gold-primary transition-all group-hover:scale-110"></i>
                    <p class="text-[12px] text-zinc-400 uppercase italic tracking-[5px]">Upload Secure Artifact</p>
                    <input type="file" id="fileInput" class="hidden" onchange="handleMetadata(this.files[0])">
                </div>
                <div id="metaResult" class="grid grid-cols-2 gap-4 font-mono bg-black/80 p-8 border border-gold-primary/10 rounded-lg overflow-y-auto max-h-[250px] text-[11px]">
                    <p class="col-span-full text-center text-zinc-800 italic tracking-[10px]">WAITING_FOR_INPUT...</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">
            <div class="card-3d p-8" data-tilt>
                <h3 class="gold-text text-xs mb-6 uppercase font-black border-b border-gold-primary/20 pb-3 italic">Vectors</h3>
                <div id="vectorList" class="space-y-3"></div>
            </div>
            <div class="md:col-span-2">
                <div class="terminal p-8 rounded-xl h-full shadow-2xl overflow-y-auto font-mono text-sm" id="terminal"></div>
            </div>
        </div>
    </div>

    <script>
        // INIT TILT EFFECT
        VanillaTilt.init(document.querySelectorAll("[data-tilt]"), {
            max: 5,
            speed: 400,
            glare: true,
            "max-glare": 0.2,
        });

        const terminal = document.getElementById('terminal');
        const header = document.querySelector('header');

        function cyberSpeak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ru-RU';
            msg.rate = 0.9;
            msg.pitch = 0.5;
            window.speechSynthesis.speak(msg);
        }

        function log(msg, color = "#d4af37") {
            const div = document.createElement('div');
            div.className = "mb-2 border-b border-white/5 pb-1 animate-pulse";
            div.innerHTML = `<span style="color: #444;">[${new Date().toLocaleTimeString()}]</span> <span style="color: ${color}; font-weight: bold;"> > ${msg}</span>`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function masterProtocol() {
            const val = document.getElementById('targetInput').value.trim();
            if(!val) {
                cyberSpeak("Мой господин, укажите цель.");
                return;
            }
            cyberSpeak(`Инициирую золотой протокол. Поиск цели ${val}.`);
            log(`STARTING ELITE PROTOCOL: ${val}`, "#fff");
            
            document.getElementById('target-label').innerHTML = `<span class="animate-pulse text-gold-light">TARGET LOCKED: ${val}</span>`;
            
            const services = [
                { name: "Epieos Deep Scan", icon: "fa-search", url: `https://epieos.com/?q=${val}` },
                { name: "Global Leak Base", icon: "fa-database", url: `https://intelx.io/?s=${val}` }
            ];

            for(let s of services) {
                log(`CONNECTING TO ${s.name.toUpperCase()}...`);
                await new Promise(r => setTimeout(r, 800));
                const a = document.createElement('div');
                a.className = "p-4 bg-black/60 border border-gold-primary/20 rounded-lg mb-3 cursor-pointer hover:border-gold-primary transition-all flex justify-between items-center group";
                a.innerHTML = `<span class="text-xs"><i class="fas ${s.icon} mr-4 text-gold-primary"></i>${s.name}</span> <i class="fas fa-external-link-alt text-[10px] opacity-0 group-hover:opacity-100 transition-all"></i>`;
                a.onclick = () => window.open(s.url, '_blank');
                document.getElementById('vectorList').appendChild(a);
            }
            cyberSpeak("Данные получены, мой господин.");
        }

        function handleMetadata(file) {
            if(!file) return;
            cyberSpeak("Анализирую структуру файла.");
            log(`ANALYZING: ${file.name}`, "#fff");
            
            EXIF.getData(file, function() {
                const tags = EXIF.getAllTags(this);
                const res = document.getElementById('metaResult');
                res.innerHTML = "";
                
                if (tags.GPSLatitude) {
                    document.getElementById('gps-status').classList.remove('hidden');
                    cyberSpeak("Внимание. Обнаружены GPS координаты.");
                }

                const info = { "NAME": file.name, "SIZE": (file.size/1024).toFixed(1)+"KB", "CAMERA": tags.Model || "UNKNOWN" };
                for(let [k,v] of Object.entries(info)) {
                    res.innerHTML += `<div class='p-3 border-b border-gold-primary/10'><p class='text-[8px] text-zinc-600'>${k}</p><p class='text-gold-light font-bold'>${v}</p></div>`;
                }
            });
        }

        window.onload = () => {
            log("INFEX OSINT GOLD EDITION BOOTED SUCCESSFULLY.", "#d4af37");
            setTimeout(() => cyberSpeak("Система активна. Приветствую вас, мой господин."), 1000);
        };
    </script>
</body>
</html>
