<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFEX OSINT | ELITE ANALYTICS SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --gold: #d4af37; --dark: #050505; --neon: #00ff41; }
        body { 
            background: var(--dark); color: #eee; font-family: 'Courier New', monospace; 
            background-image: radial-gradient(circle at center, #111 0%, #050505 100%);
            min-height: 100vh; overflow-x: hidden;
        }
        .gold-border { border: 1px solid var(--gold); box-shadow: 0 0 20px rgba(212,175,55,0.15); }
        .gold-text { color: var(--gold); text-shadow: 0 0 8px rgba(212,175,55,0.4); }
        .card { 
            background: rgba(10,10,10,0.95); border: 1px solid rgba(212,175,55,0.2); 
            border-radius: 4px; transition: all 0.3s ease;
        }
        .card:hover { border-color: var(--gold); box-shadow: 0 0 25px rgba(212,175,55,0.1); }
        .btn-gold { 
            background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728);
            color: black; font-weight: 900; transition: 0.3s; cursor: pointer;
        }
        .btn-gold:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--gold); filter: brightness(1.1); }
        .terminal { background: #000; border: 1px solid #222; height: 220px; overflow-y: auto; font-size: 11px; padding: 12px; color: var(--neon); }
        input { background: #0a0a0a !important; border: 1px solid #333 !important; color: var(--gold) !important; outline: none; }
        .scanning { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        #drop-zone.active { border-color: var(--gold); background: rgba(212,175,55,0.05); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-10 p-8 gold-border rounded-lg bg-black relative overflow-hidden">
            <h1 class="text-6xl font-black gold-text tracking-tighter mb-2">INFEX OSINT</h1>
            <p class="text-gray-500 uppercase tracking-[15px] text-[10px]">Elite Digital Intelligence Hub v4.0</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="lg:col-span-2 card p-6">
                <label class="text-[10px] text-gray-500 uppercase mb-2 block">Введите цель</label>
                <div class="flex flex-col md:flex-row gap-3">
                    <input type="text" id="targetInput" class="flex-grow p-4 text-xl font-bold rounded" placeholder="Email, IP, Domain или Nickname...">
                    <button onclick="masterProtocol()" id="startBtn" class="btn-gold px-12 py-4 uppercase">Запустить протокол</button>
                </div>
                <div class="mt-6 grid grid-cols-2 md:grid-cols-4 gap-2">
                    <button onclick="quickDork('leak')" class="text-[9px] border border-red-900/50 text-red-500 p-2 uppercase hover:bg-red-900/20">Утечки</button>
                    <button onclick="quickDork('docs')" class="text-[9px] border border-blue-900/50 text-blue-500 p-2 uppercase hover:bg-blue-900/20">Документы</button>
                    <button onclick="quickDork('env')" class="text-[9px] border border-green-900/50 text-green-500 p-2 uppercase hover:bg-green-900/20">Конфиги</button>
                    <button onclick="quickDork('social')" class="text-[9px] border border-gold/30 text-gold p-2 uppercase hover:bg-gold/10">Соцсети</button>
                </div>
            </div>

            <div class="card p-6 flex flex-col justify-center items-center" id="drop-zone">
                <i class="fas fa-file-invoice text-3xl mb-3 text-gray-700"></i>
                <h3 class="text-[10px] text-gray-500 uppercase mb-2">Metadata Analyzer</h3>
                <input type="file" id="fileInput" class="hidden" onchange="handleMetadata(this.files[0])">
                <button onclick="document.getElementById('fileInput').click()" class="text-xs gold-text underline">Загрузить файл</button>
                <div id="metaResult" class="mt-4 text-[10px] text-center text-green-500 font-mono h-12 overflow-y-auto"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="card p-5">
                <h3 class="gold-text text-sm mb-4 uppercase"><i class="fas fa-fingerprint mr-2"></i> Graph Status</h3>
                <div id="graph-area" class="h-48 border border-gray-900 rounded flex items-center justify-center">
                    <div id="target-node" class="w-24 h-24 rounded-full border-2 border-gold flex items-center justify-center text-[10px] text-center p-2 font-bold bg-black">WAITING</div>
                </div>
            </div>
            <div class="card p-5"><h3 class="gold-text text-sm mb-4 uppercase">Vectors</h3><div id="vectorList" class="space-y-2 text-[11px]"></div></div>
            <div class="card p-5"><h3 class="gold-text text-sm mb-4 uppercase">Leak Data</h3><div id="intelList" class="space-y-2 text-[11px]"></div></div>
        </div>

        <div class="terminal font-mono mb-4" id="terminal">
            <div>> [SYSTEM] INFEX OSINT BOOTED. STANDING BY...</div>
        </div>

        <div class="flex justify-between items-center">
            <span class="text-[9px] text-gray-700 uppercase">Secure Session Active</span>
            <button onclick="generateReport()" class="text-[10px] gold-text uppercase font-bold border-b border-gold">Скачать финальный отчет</button>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');

        function log(msg, color = "#00ff41") {
            const div = document.createElement('div');
            div.innerHTML = `<span style="color: #444">[${new Date().toLocaleTimeString()}]</span> <span style="color: ${color}">> ${msg}</span>`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function detectType(input) {
            if(input.includes("@")) return "email";
            if(/^\d+\.\d+\.\d+\.\d+$/.test(input)) return "ip";
            if(input.includes(".")) return "domain";
            return "username";
        }

        async function fakeScan() {
            const steps = ["Инициализация протоколов...", "Сканирование соцсетей...", "Анализ утечек баз данных...", "Сбор метаданных инфраструктуры...", "Генерация векторов атаки...", "Формирование отчета..."];
            for(let step of steps) {
                log(step, "#aaa");
                await new Promise(r => setTimeout(r, 600));
            }
        }

        function createLink(containerId, title, url) {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = "flex justify-between items-center p-2 bg-white/5 border border-gray-900 rounded hover:border-gold/50 cursor-pointer mb-2";
            div.innerHTML = `<span>${title}</span> <i class="fas fa-external-link-alt text-[9px] text-gold/60"></i>`;
            div.onclick = () => window.open(url, '_blank');
            container.appendChild(div);
        }

        async function masterProtocol() {
            const val = document.getElementById('targetInput').value.trim();
            if(!val) return;

            document.getElementById('startBtn').disabled = true;
            const type = detectType(val);
            
            log(`Цель: ${val}`, "#fff");
            log(`Тип цели определен: ${type.toUpperCase()}`, "#d4af37");
            
            document.getElementById('target-node').innerText = val.toUpperCase();
            document.getElementById('target-node').classList.add('scanning');
            
            await fakeScan();

            document.getElementById('vectorList').innerHTML = "";
            document.getElementById('intelList').innerHTML = "";

            // Наполнение результатами
            createLink('vectorList', "WhatsMyName Search", `https://whatsmyname.app/?q=${val}`);
            createLink('vectorList', "Epieos Intelligence", `https://epieos.com/?q=${val}`);
            createLink('intelList', "Shodan Global", `https://www.shodan.io/search?query=${val}`);
            createLink('intelList', "IntelX Leaks", `https://intelx.io/?s=${val}`);
            createLink('intelList', "Wayback Archive", `https://web.archive.org/web/*/${val}`);

            log("Протокол завершен. Все данные синхронизированы.", "#00ff41");
            document.getElementById('target-node').classList.remove('scanning');
            document.getElementById('startBtn').disabled = false;
        }

        function handleMetadata(file) {
            if(!file) return;
            const resBox = document.getElementById('metaResult');
            resBox.innerHTML = "<span class='scanning'>ЧТЕНИЕ EXIF...</span>";
            log(`Анализ файла: ${file.name}`, "#3b82f6");

            if(file.type.match('image.*')) {
                EXIF.getData(file, function() {
                    const make = EXIF.getTag(this, "Make") || "N/A";
                    const model = EXIF.getTag(this, "Model") || "N/A";
                    resBox.innerHTML = `DEVICE: ${make} ${model}<br>SIZE: ${(file.size/1024).toFixed(1)} KB`;
                    log(`Метаданные извлечены: ${make} ${model}`, "#3b82f6");
                });
            } else {
                resBox.innerHTML = `FILE: ${file.name}<br>SIZE: ${(file.size/1024).toFixed(1)} KB`;
            }
        }

        function quickDork(type) {
            const val = document.getElementById('targetInput').value;
            if(!val) return alert("Введите цель!");
            let q = type === 'leak' ? `site:pastebin.com "${val}" password` : `site:*.* "${val}" filetype:pdf`;
            window.open(`https://www.google.com/search?q=${encodeURIComponent(q)}`, '_blank');
        }

        function generateReport() {
            const val = document.getElementById('targetInput').value || "UNKNOWN";
            const content = `
=== INFEX OSINT REPORT ===
Target: ${val}
Type: ${detectType(val).toUpperCase()}
Risk Level: MEDIUM/HIGH

Findings:
- Digital footprint analyzed
- Social vectors identified
- Infrastructure logs captured

Timestamp: ${new Date().toISOString()}
System: INFEX OSINT ELITE v4.0
==========================
            `;
            const blob = new Blob([content], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `INFEX_REPORT_${val}.txt`;
            a.click();
            log("Отчет успешно сформирован.", "#d4af37");
        }
    </script>
</body>
</html>
